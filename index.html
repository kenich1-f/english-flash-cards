<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>English Flash Cards</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home">

<h1>English Flash Cards</h1>

<select id="range">
  <option value="last100">🔥 試験直前100語</option>
<option value="all">401〜1800</option>
<option value="401-600">401〜600</option>
<option value="601-800">601〜800</option>
<option value="801-1000">801〜1000</option>
<option value="1001-1200">1001〜1200</option>
<option value="1201-1400">1201〜1400</option>
<option value="1401-1600">1401〜1600</option>
<option value="1601-1800">1601〜1800</option>
</select>

<br><br>

<select id="mode">
<option value="normal">順番</option>
<option value="shuffle">シャッフル</option>
</select>

<br><br>

<label>
<input type="checkbox" id="dark">
ダークモード
</label>

<br><br>

<button id="start">
学習開始
</button>

<button id="review">
苦手復習
</button>

</div>

<div id="study" style="display:none;">

<p id="progress"></p>

<div id="card"></div>

<br>

<button id="flip">答えを見る</button>

<br><br>

<button id="known">覚えた</button>

<button id="unknown">まだ</button>

<br><br>

<button id="prev">前へ</button>

<button id="next">次へ</button>

<br><br>

<button id="homeBtn">
ホームへ戻る
</button>

</div>

<script src="words.js"></script>
<script src="app.js"></script>

</body>
</html>
